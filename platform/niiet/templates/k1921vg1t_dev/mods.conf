package genconfig

configuration conf {
	include embox.arch.system(core_freq=150000000)
	include embox.arch.riscv.kernel.entry(tvec_alignment=6)
	include embox.arch.riscv.kernel.locore
	include embox.arch.riscv.kernel.context
	include embox.arch.riscv.libarch
	include embox.arch.riscv.vfork

	include platform.niiet.soc.cpu_info
	include embox.lib.sysctl(platform="VG1T-dev", processor="K1921VG1T")
	include platform.niiet.k1921vg1t.platform_init

	include embox.driver.interrupt.riscv_plic(base_addr=0xFE000000)

	/* @Runlevel(0) */ 
	include embox.driver.clock.niiet.niiet_tmr(vg1t_version=1, base_addr=0x51008000, irq_num=16)
	/* @Runlevel(0) */ 
	include embox.kernel.time.jiffies(cs_name="tmr32")

	include embox.driver.serial.pl011(uartclk=27000000, use_bconf=true)
	include embox.driver.serial.pl011_diag(base_addr=0x52010000)
	include embox.driver.diag(impl="embox__driver__serial__pl011_diag")
	include embox.driver.serial.pl011_ttyS0(base_addr=0x52010000, irq_num=64)

	include embox.driver.clk.niiet.k1921vg1t_rcu
	include embox.driver.sys_ctrl.niiet.siu_k1921vg1t

	include embox.driver.gpio.niiet_gpio(altfunc_field_width=4)

	include embox.driver.spi.pl022_spi_drv(vg1t_sup=true)
	@Runlevel(1) include embox.driver.spi.pl022_spi1(base_addr=0x52009000, irq_num=123, use_board_conf=true)
	@Runlevel(1) include embox.driver.spi.pl022_spi0(base_addr=0x52008000, irq_num=120, use_board_conf=true)
//	@Runlevel(2) include embox.driver.spi.spi1_dev0(cs_port=0, cs_pin=5, cs_func=1) // CS = SPI_FSS
	@Runlevel(2) include embox.driver.spi.spi1_dev0(cs_port=0, cs_pin=5, cs_pullup=1, cs_pushpull=1) // CS - GPIO control
