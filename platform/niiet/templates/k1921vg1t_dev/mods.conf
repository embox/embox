	include embox.net.skbuff(amount_skb=10)
	include embox.net.skbuff_data(amount_skb_data=10)
	include embox.net.sock_noxattr
	include embox.net.tcp
	include embox.net.tcp_sock

	include embox.lib.libds

	include embox.framework.LibFramework

	include embox.compat.libc.stdio.print(support_floating=0)
	include embox.compat.libc.stdio.scanf
	include embox.compat.libc.stdio.file_ops
	include embox.compat.posix.index_descriptor
	include embox.compat.posix.file_system_dvfs
	include embox.compat.libc.math_openlibm
	include embox.compat.posix.util.gethostname
//	include embox.compat.posix.pthreads 	// add support Threads 

	include embox.mem.heap_bm
	include embox.mem.static_heap(heap_size=0x10000) /* in SRAM_CCM */
	include embox.mem.bitmask(page_size=64)

	include embox.cmd.sh.shell_api(welcome_msg = "Welcome to Embox")
	@Runlevel(3) include embox.init.start_script(shell_name="tish",tty_dev="ttyS0")

	include embox.cmd.sh.tish(
		builtin_commands = "version pin uname help ticker cpuinfo"
	)

	include embox.cmd.help
	include embox.cmd.sys.version
	include embox.cmd.sys.uname
	include embox.cmd.cpuinfo

	include embox.cmd.msleep

	include embox.cmd.fs.dd
	include embox.cmd.fs.cat
	include embox.cmd.fs.ls
	include embox.cmd.fs.rm
	include embox.cmd.fs.mount
	include embox.cmd.fs.umount
	include embox.cmd.fs.stat
	include embox.cmd.fs.echo
	include embox.cmd.fs.touch
	include embox.cmd.fs.mkdir

	include embox.cmd.testing.ticker

	include embox.cmd.hw.mem
	include embox.cmd.hardware.pin
	include embox.cmd.hw.pwm
	include embox.cmd.hardware.spi

	include embox.cmd.i2c_tools.i2cdetect
	include embox.cmd.i2c_tools.i2cdump
	include embox.cmd.i2c_tools.i2cget
	include embox.cmd.i2c_tools.i2cset

	include embox.cmd.hardware.sensors.l3g4200d
	include embox.cmd.hardware.sensors.bmp280
