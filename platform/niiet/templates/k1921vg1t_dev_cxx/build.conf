
TARGET = embox

PLATFORM=niiet_k1921vg1t_dev

CHIP_VENDOR = niiet
PLATFORM_VENDOR = niiet

ARCH = riscv

CROSS_COMPILE = riscv64-unknown-elf-

OPTIMIZATION_FLAGS =  -g3 -O0

// ARCH_FLAGS = -march=rv32imfc_zicsr_zifencei -mabi=ilp32f
ARCH_FLAGS = -march=rv32imfdc_zicsr_zifencei -mabi=ilp32d

ALIGN_FLAGS = -falign-functions -falign-jumps -falign-labels -falign-loops

CFLAGS += $(OPTIMIZATION_FLAGS)
CFLAGS += $(ARCH_FLAGS)
CFLAGS += $(ALIGN_FLAGS)

CXXFLAGS += $(OPTIMIZATION_FLAGS)
CXXFLAGS += $(ARCH_FLAGS)
CXXFLAGS += $(ALIGN_FLAGS)
CXXFLAGS += -fno-threadsafe-statics

LDFLAGS += -melf32lriscv
