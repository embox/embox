/*
 * TI AM62x / BeagleBoard.org PocketBeagle 2
 *
 * DDR is at 0x80000000, total 512 MB. U-Boot refuses raw loads at
 * 0x80080000 on PocketBeagle 2 because that range overlaps its reserved
 * memory map. Match the NuttX PocketBeagle 2 dramboot layout and load at
 * 0x82000000 instead, leaving the lower 32 MB of DDR to firmware/U-Boot.
 * The region extends to the top of DDR (0xa0000000).
 */

/* region (origin, length) */
RAM (0x82000000, 0x1e000000)

/* section (region[, lma_region]) */
text   (RAM)
rodata (RAM)
data   (RAM)
bss    (RAM)
