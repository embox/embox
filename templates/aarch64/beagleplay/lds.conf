/*
 * TI AM62x / BeagleBoard.org BeaglePlay
 *
 * DDR is at 0x80000000, total 2 GB. U-Boot `go` lands at 0x80080000.
 * We reserve a 1 GB window here which is comfortably ample for Embox
 * heaps; the upper half of DDR is left free for user payloads.
 */

/* region (origin, length) */
RAM (0x80080000, 0x3ff80000)

/* section (region[, lma_region]) */
text   (RAM)
rodata (RAM)
data   (RAM)
bss    (RAM)
